<style>
:root{
  --m:#7c1522;--m2:#9c2232;
  --mbg:rgba(124,21,34,.06);--mbd:rgba(124,21,34,.18);

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
body.rtl{direction:rtl;font-family:'Noto Naskh Arabic','Syne',sans-serif}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--m);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.nav-l{display:flex;align-items:center;gap:10px}
.nav-mark{width:32px;height:32px;background:var(--gold2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink)}
.nav-name{font-size:15px;font-weight:700;color:white}
.nav-ar{font-family:'Noto Naskh Arabic',serif;font-size:12px;color:rgba(255,255,255,.35);margin-left:6px}
.nav-r{display:flex;gap:8px}
.nb{height:32px;padding:0 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;border:none}
.nb-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.18)}

.nb-back{background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.18);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.nb-back:hover{background:rgba(255,255,255,.2)}
.wrap{max-width:600px;margin:0 auto;padding:82px 20px 80px}
.prog-wrap{margin-bottom:28px}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--ink4);margin-bottom:8px}
.prog-bar{height:4px;background:var(--cream3);border-radius:2px;overflow:hidden}

.pillar-chip{display:inline-flex;align-items:center;gap:7px;background:var(--mbg);border:1px solid var(--mbd);border-radius:100px;padding:4px 13px;margin-bottom:14px;font-size:11px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:.07em}
.q-card{background:var(--bg);border:1px solid var(--cream3);border-radius:var(--rxl);padding:32px 36px;box-shadow:var(--sh);position:relative;overflow:hidden;animation:qi .3s ease}

.q-num{font-size:11px;color:var(--ink4);margin-bottom:10px;font-weight:500}
.q-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--ink);line-height:1.35;margin-bottom:22px;letter-spacing:-.01em}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:13px;padding:13px 16px;border:1.5px solid var(--cream3);border-radius:var(--r);cursor:pointer;transition:all .18s;background:var(--cream);user-select:none}
.opt:hover{border-color:rgba(124,21,34,.3);background:white}
.opt.sel{border-color:var(--m);background:var(--mbg)}
.opt-letter{width:26px;height:26px;border-radius:6px;background:var(--cream3);border:1px solid var(--cream2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink3);flex-shrink:0;transition:all .18s}
.opt.sel .opt-letter{background:var(--m);border-color:var(--m);color:white}
.opt-text{font-size:13px;color:var(--ink2);line-height:1.45;flex:1}
.opt.sel .opt-text{color:var(--ink)}
.q-nav{display:flex;gap:10px;margin-top:20px}
.btn-next{flex:1;height:46px;background:var(--m);color:white;border:none;border-radius:var(--r);font-size:13.5px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-next:hover{background:var(--m2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(124,21,34,.28)}
.btn-next:disabled{background:var(--cream3);color:var(--ink4);cursor:not-allowed;transform:none;box-shadow:none}
.btn-prev{height:46px;width:46px;background:transparent;border:1.5px solid var(--cream3);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .15s;flex-shrink:0}

.id-card{background:var(--bg);border:1px solid var(--cream3);border-radius:var(--rxl);padding:36px;box-shadow:var(--sh);position:relative;overflow:hidden;animation:qi .3s ease}

.id-hero{text-align:center;margin-bottom:28px}
.id-icon{font-size:44px;margin-bottom:12px}
.id-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;color:var(--ink);letter-spacing:-.02em;margin-bottom:8px}
.id-sub{font-size:13px;color:var(--ink3);line-height:1.7;max-width:380px;margin:0 auto}
.pillars-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:20px 0 24px}
.pp-item{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--r);padding:10px 12px;text-align:center}
.pp-ic{font-size:18px;margin-bottom:4px}
.pp-lbl{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.fl em{color:var(--m);font-style:normal;margin-left:2px}
.fi{width:100%;background:var(--cream);border:1.5px solid var(--cream3);color:var(--ink);padding:11px 13px;border-radius:var(--r);font-size:13px;font-family:'Syne',sans-serif;transition:all .15s;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--m);background:white;box-shadow:0 0 0 3px rgba(124,21,34,.08)}
.fi::placeholder{color:var(--ink4)}
.fi option{background:white}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-start{width:100%;height:50px;background:var(--m);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:4px}

.f-priv{font-size:11px;color:var(--ink4);text-align:center;margin-top:9px}
.res-card{background:var(--bg);border:1px solid var(--cream3);border-radius:var(--rxl);padding:36px;box-shadow:var(--sh);position:relative;overflow:hidden;animation:qi .35s ease}

.sr-num{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:500;line-height:1;margin-bottom:4px}

.sr-sub{font-size:13px;color:var(--ink3);max-width:360px;margin:0 auto;line-height:1.6}
.pillars-result{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.pr-item{display:flex;align-items:center;gap:12px}
.pr-ic{font-size:16px;width:26px;flex-shrink:0;text-align:center}
.pr-lbl{font-size:12px;font-weight:600;color:var(--ink2);width:130px;flex-shrink:0}
.pr-bar-bg{flex:1;height:7px;background:var(--cream3);border-radius:4px;overflow:hidden}
.pr-bar{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}
.pr-pct{font-size:12px;font-weight:600;color:var(--ink);width:32px;text-align:right;flex-shrink:0}
.gaps-section{background:var(--cream);border:1px solid var(--cream3);border-radius:var(--rl);padding:16px 18px;margin-bottom:20px}
.gs-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:10px}

.gap-item:last-child{border-bottom:none;padding-bottom:0}
.gap-item::before{content:'↑';color:var(--m);font-weight:700;flex-shrink:0;margin-top:1px}
.price-reveal{background:linear-gradient(135deg,var(--gold-bg),var(--bg));border:1.5px solid rgba(184,137,42,.28);border-radius:var(--rl);padding:20px 22px;margin-bottom:14px;text-align:center}
.pr-eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:6px}
.pr-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px}
.pr-sub{font-size:12px;color:var(--ink3);margin-bottom:14px;line-height:1.5}
.pr-price{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--gold);margin-bottom:16px}
.pr-price small{font-size:14px;font-family:'Syne',sans-serif;color:var(--ink3);font-weight:400}
.btn-wa{width:100%;height:50px;display:flex;align-items:center;justify-content:center;gap:10px;background:#16a34a;color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;margin-bottom:8px}
.btn-wa:hover{background:#15803d;transform:translateY(-1px);box-shadow:0 6px 22px rgba(22,163,74,.28)}
.btn-sec{width:100%;height:42px;background:transparent;color:var(--ink3);border:1.5px solid var(--cream3);border-radius:var(--r);font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.btn-sec:hover{color:var(--ink);border-color:var(--ink3)}
.opt-in-box{background:var(--bbg);border:1px solid var(--bbd);border-radius:var(--r);padding:14px 16px;margin-bottom:16px}
.oi-title{font-size:12.5px;font-weight:600;color:var(--blue);margin-bottom:4px}
.oi-sub{font-size:11.5px;color:var(--blue);opacity:.8;line-height:1.55;margin-bottom:10px}
.oi-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.oi-pip{width:38px;height:21px;border-radius:11px;background:var(--cream3);border:2px solid var(--cream3);position:relative;transition:all .2s;flex-shrink:0}
.oi-pip::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:var(--ink4);border-radius:50%;transition:all .2s}
.oi-toggle.on .oi-pip{background:var(--blue);border-color:var(--blue)}
.oi-toggle.on .oi-pip::after{left:17px;background:white}
.oi-lbl{font-size:12px;color:var(--blue);line-height:1.4}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 22px;border-radius:100px;font-size:13px;z-index:600;box-shadow:var(--sh2);white-space:nowrap;animation:tu .25s ease}
@keyframes tu{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@media(max-width:600px){
  .nav{padding:0 1rem}
  .q-card,.id-card,.res-card{padding:24px 18px}
  .pillars-preview{grid-template-columns:1fr 1fr}
  .fi-row{grid-template-columns:1fr}
  .pr-lbl{width:90px}
}
</style>

   opts:[{en:'Clear succession plan with capable management',ar:'خطة خلافة واضحة مع إدارة قادرة',s:4},{en:'Some team members could step up',ar:'بعض الفريق قادر على التقدم',s:2},{en:'Business fully dependent on the owner',ar:'العمل يعتمد بالكامل على المالك',s:0}]},
  {p:'growth',en:'Does your business have a documented strategic plan?',ar:'هل يمتلك عملك خطة استراتيجية موثقة؟',
   opts:[{en:'Formal plan reviewed regularly',ar:'خطة رسمية تُراجع بانتظام',s:4},{en:'Goals exist but not written down',ar:'أهداف موجودة لكن غير مكتوبة',s:2},{en:'No strategic plan',ar:'لا خطة استراتيجية',s:0}]},
  {p:'growth',en:'How aware are you of your competitors?',ar:'ما مدى إدراكك لمنافسيك؟',
   opts:[{en:'Active competitor analysis and benchmarking',ar:'تحليل نشط للمنافسين',s:4},{en:'Generally aware but not tracking formally',ar:'على دراية عامة غير رسمية',s:2},{en:'Limited awareness',ar:'وعي محدود',s:0}]},
  {p:'growth',en:'Is your business model scalable beyond Qatar?',ar:'هل نموذج عملك قابل للتوسع خارج قطر؟',
   opts:[{en:'Actively planning GCC or international expansion',ar:'نخطط للتوسع الخليجي أو الدولي',s:4},{en:'Potentially scalable with adaptation',ar:'قابل للتوسع مع بعض التكيّف',s:2},{en:'Local Qatar focus only',ar:'تركيز محلي فقط',s:0}]},
];
const TOTAL=QS.length;

function t(en,ar){return lang==='ar'?ar:en;}
function toggleLang(){
  lang=lang==='en'?'ar':'en';
  document.body.classList.toggle('rtl',lang==='ar');
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.getElementById('lang-btn').textContent=lang==='en'?'العربية':'English';
  document.getElementById('back-lbl').textContent=t('Back','رجوع');
  rerender();
}
function rerender(){
  if(currentQ===-1)renderIdentity();
  else if(currentQ>=TOTAL)renderResults();
  else renderQuestion(currentQ);
}

function renderIdentity(){
  document.getElementById('wrap').innerHTML=`
  <div class="id-card">
    <div class="id-hero">
      <div class="id-icon">📊</div>
      <div class="id-title">${t('Investment Readiness Score','نقاط الجاهزية للاستثمار')}</div>
      <div class="id-sub">${t('Answer 18 quick questions across 6 areas. See your score instantly — no sensitive financial data required.','أجب على 18 سؤالاً سريعاً في 6 محاور. شاهد نتيجتك فوراً — لا بيانات مالية حساسة مطلوبة.')}</div>
    </div>
    <div class="pillars-preview">
      ${PILLARS.map(p=>`<div class="pp-item"><div class="pp-ic">${p.ic}</div><div class="pp-lbl">${t(p.en,p.ar)}</div></div>`).join('')}
    </div>
    <div class="fg"><label class="fl">${t('Company Name','اسم الشركة')} <em>*</em></label><input class="fi" id="id-co" type="text" placeholder="${t('Al Rashid Trading W.L.L.','شركة الراشد للتجارة')}"></div>
    <div class="fi-row">
      <div class="fg" style="margin-bottom:0"><label class="fl">${t('Your Name','اسمك')} <em>*</em></label><input class="fi" id="id-name" type="text" placeholder="${t('Ahmed Al-Rashid','أحمد الراشد')}"></div>
      <div class="fg" style="margin-bottom:0"><label class="fl">${t('WhatsApp','واتساب')} <em>*</em></label><input class="fi" id="id-phone" type="tel" placeholder="+974 5XXX XXXX"></div>
    </div>
    <div class="fg" style="margin-top:14px"><label class="fl">${t('Industry','القطاع')}</label>
      <select class="fi" id="id-sector">
        <option value="trading">${t('Trading / Services','التجارة / الخدمات')}</option>
        <option value="construction">${t('Construction / Contracting','الإنشاء / المقاولات')}</option>
        <option value="fmcg">${t('F&B / Retail / FMCG','الأغذية / التجزئة')}</option>
        <option value="hospitality">${t('Hospitality / Tourism','الضيافة / السياحة')}</option>
        <option value="tech">${t('Technology / Digital','التكنولوجيا / الرقمي')}</option>
        <option value="manufacturing">${t('Manufacturing','التصنيع')}</option>
        <option value="other">${t('Other','أخرى')}</option>
      </select>
    </div>
    <button class="btn-start" onclick="startAssessment()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      ${t('Start — 18 Questions (3 mins)','ابدأ — 18 سؤالاً (3 دقائق)')}
    </button>
    <div class="f-priv">🔒 ${t('No financial figures required.','لا أرقام مالية مطلوبة.')}</div>
  </div>`;
}

function startAssessment(){
  const co=document.getElementById('id-co').value.trim();
  const nm=document.getElementById('id-name').value.trim();
  const ph=document.getElementById('id-phone').value.trim();
  if(!co){toast(t('Company name is required.','اسم الشركة مطلوب.'));return;}
  if(!nm){toast(t('Your name is required.','اسمك مطلوب.'));return;}
  if(!ph){toast(t('WhatsApp number is required.','رقم واتساب مطلوب.'));return;}
  identity={co,nm,ph,sector:document.getElementById('id-sector').value};
  currentQ=0;renderQuestion(0);window.scrollTo(0,0);
}

function renderQuestion(i){
  const q=QS[i];
  const pillar=PILLARS.find(p=>p.key===q.p);
  const pct=Math.round(((i+1)/TOTAL)*100);
  const sel=answers[i];
  document.getElementById('wrap').innerHTML=`
  <div class="prog-wrap">
    <div class="prog-meta"><span>${t('Question','سؤال')} ${i+1} ${t('of','من')} ${TOTAL}</span><span>${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="pillar-chip"><span style="font-size:14px">${pillar.ic}</span>${t(pillar.en,pillar.ar)}</div>
  <div class="q-card">
    <div class="q-num">${t('Question','سؤال')} ${i+1}</div>
    <div class="q-text">${t(q.en,q.ar)}</div>
    <div class="opts">
      ${q.opts.map((o,oi)=>`
      <div class="opt${sel===oi?' sel':''}" onclick="selectOpt(${oi})">
        <div class="opt-letter">${String.fromCharCode(65+oi)}</div>
        <div class="opt-text">${t(o.en,o.ar)}</div>
      </div>`).join('')}
    </div>
    <div class="q-nav">
      ${i>0?`<button class="btn-prev" onclick="prevQ()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></button>`:''}
      <button class="btn-next" onclick="nextQ()" ${sel===undefined?'disabled':''} id="btn-nxt">
        ${i===TOTAL-1
          ?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> ${t('See My Score','اعرض نتيجتي')}`
          :`${t('Next','التالي')} <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`}
      </button>
    </div>
  </div>`;
}

function selectOpt(oi){
  answers[currentQ]=oi;
  document.querySelectorAll('.opt').forEach((el,idx)=>el.classList.toggle('sel',idx===oi));
  document.getElementById('btn-nxt')?.removeAttribute('disabled');
  if(currentQ<TOTAL-1)setTimeout(()=>nextQ(),320);
}
function nextQ(){
  if(answers[currentQ]===undefined){toast(t('Please select an answer.','يرجى اختيار إجابة.'));return;}
  currentQ++;
  if(currentQ>=TOTAL)renderResults();else renderQuestion(currentQ);
  window.scrollTo(0,0);
}
function prevQ(){if(currentQ>0){currentQ--;renderQuestion(currentQ);window.scrollTo(0,0);}}

function calcScore(){
  const ps={};PILLARS.forEach(p=>{ps[p.key]={raw:0,max:0};});
  QS.forEach((q,i)=>{
    if(answers[i]!==undefined){
      ps[q.p].raw+=q.opts[answers[i]].s;
      ps[q.p].max+=Math.max(...q.opts.map(o=>o.s));
    }
  });
  const pcts={};PILLARS.forEach(p=>{pcts[p.key]=ps[p.key].max>0?Math.round((ps[p.key].raw/ps[p.key].max)*100):0;});
  let total=0;PILLARS.forEach(p=>{total+=pcts[p.key]*p.w;});
  return{pcts,total:Math.round(total)};
}
function getBand(s){
  if(s>=80)return{en:'Investment Ready',ar:'جاهز للاستثمار',sub:{en:'Your profile is strong. Investors and QDB can engage now.',ar:'ملفك قوي. يمكن للمستثمرين وبنك قطر التعامل معك الآن.'},col:'#14532d'};
  if(s>=60)return{en:'Growth Ready',ar:'جاهز للنمو',sub:{en:'Solid foundation — strengthen key areas to attract investment.',ar:'أساس متين — قوّ المجالات الرئيسية لجذب الاستثمار.'},col:'#1e3a5f'};
  if(s>=40)return{en:'Developing',ar:'في طور التطوير',sub:{en:'Compliance and operations improvements will significantly boost your readiness.',ar:'تحسينات الامتثال والعمليات ستزيد جاهزيتك بشكل كبير.'},col:'#92400e'};
  return{en:'Early Stage',ar:'مرحلة مبكرة',sub:{en:'Build compliance and financial foundations first.',ar:'ابنِ أسس الامتثال والمالية أولاً.'},col:'#b91c1c'};
}

function renderResults(){
  const{pcts,total}=calcScore();
  const band=getBand(total);
  const gaps=[...PILLARS].map(p=>({...p,pct:pcts[p.key]})).sort((a,b)=>a.pct-b.pct).slice(0,3);
  try{
    const leads=JSON.parse(localStorage.getItem('mz_leads')||'[]');
    leads.push({id:'inv_'+Date.now(),name:identity.nm,phone:identity.ph,company:identity.co,sector:identity.sector,investScore:total,investBand:band.en,pillarPcts:pcts,optIn:false,ts:Date.now(),type:'invest',date:new Date().toLocaleDateString('en-GB'),time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});
    localStorage.setItem('mz_leads',JSON.stringify(leads));
  }catch(e){}

  document.getElementById('wrap').innerHTML=`
  <div class="res-card">
    <div class="score-ring">
      <div class="sr-num" style="color:${band.col}">${total}</div>
      <div class="sr-label" style="color:${band.col}">${t(band.en,band.ar)}</div>
      <div class="sr-sub">${t(band.sub.en,band.sub.ar)}</div>
    </div>
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:12px">${t('Score by pillar','النتيجة حسب المحور')}</div>
    <div class="pillars-result">
      ${PILLARS.map(p=>{
        const pct=pcts[p.key];
        const col=pct>=70?'#14532d':pct>=40?'#92400e':'#b91c1c';
        return `<div class="pr-item"><div class="pr-ic">${p.ic}</div><div class="pr-lbl">${t(p.en,p.ar)}</div><div class="pr-bar-bg"><div class="pr-bar" style="width:0%;background:${col}" data-pct="${pct}"></div></div><div class="pr-pct">${pct}%</div></div>`;
      }).join('')}
    </div>
    <div class="gaps-section">
      <div class="gs-title">${t('Top 3 areas to improve','أبرز 3 مجالات للتحسين')}</div>
      ${gaps.map(g=>`<div class="gap-item">${t(g.en,g.ar)} — ${g.pct}%</div>`).join('')}
    </div>
    <div class="opt-in-box">
      <div class="oi-title">${t('Join the Mizaan Investor Network','انضم لشبكة مستثمري ميزان')}</div>
      <div class="oi-sub">${t("We'll add your profile to our investor network. If an investor shows interest in your sector, we'll reach out — no obligation.",'سنضيف ملفك لشبكة المستثمرين. إذا أبدى مستثمر اهتماماً بقطاعك سنتواصل معك — بلا التزام.')}</div>
      <div class="oi-toggle" id="oi-toggle" onclick="toggleOptIn()">
        <div class="oi-pip" id="oi-pip"></div>
        <div class="oi-lbl">${t('Add my profile to the investor network','أضف ملفي إلى شبكة المستثمرين')}</div>
      </div>
    </div>
    <div class="price-reveal">
      <div class="pr-eyebrow">${t('Next step','الخطوة التالية')}</div>
      <div class="pr-title">${t('Get your personalised investment roadmap','احصل على خارطة طريق استثمارية شخصية')}</div>
      <div class="pr-sub">${t('Share your score with Guardian Consulting. Our team will contact you with specific actions to raise your score and connect you with the right opportunities.','شارك نتيجتك مع Guardian Consulting. سيتواصل معك فريقنا بإجراءات محددة لرفع نتيجتك وربطك بالفرص المناسبة.')}</div>
      <div class="pr-price">QAR 99<small> ${t('· advisory session','· جلسة استشارية')}</small></div>
      <button class="btn-wa" onclick="shareScore()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        ${t('Share Score via WhatsApp — QAR 99','شارك النتيجة عبر واتساب — 99 ريال')}
      </button>
      <button class="btn-sec" onclick="currentQ=-1;answers={};renderIdentity();">${t('Start over','ابدأ من جديد')}</button>
    </div>
  </div>`;
  setTimeout(()=>document.querySelectorAll('.pr-bar').forEach(b=>{b.style.width=b.dataset.pct+'%';}),150);
}

function toggleOptIn(){
  optIn=!optIn;
  document.getElementById('oi-toggle').classList.toggle('on',optIn);
  try{
    const leads=JSON.parse(localStorage.getItem('mz_leads')||'[]');
    const last=[...leads].reverse().find(l=>l.type==='invest');
    if(last){last.optIn=optIn;localStorage.setItem('mz_leads',JSON.stringify(leads));}
  }catch(e){}
}

function shareScore(){
  const{pcts,total}=calcScore();
  const band=getBand(total);
  const a=lang==='ar';
  const lines=PILLARS.map(p=>`  • ${t(p.en,p.ar)}: ${pcts[p.key]}%`).join('\n');
  const msg=a
    ?`مرحباً Guardian Consulting، أنا ${identity.nm} من ${identity.co}.\n\nنتيجة الجاهزية للاستثمار: ${total}/100 — ${t(band.en,band.ar)}\n\nالنتائج حسب المحور:\n${lines}\n\n${optIn?'✅ أوافق على إضافة ملفي لشبكة المستثمرين.\n':''}أود مناقشة الخطوات التالية (99 ريال).`
    :`Hi Guardian Consulting, I'm ${identity.nm} from ${identity.co}.\n\nInvestment Readiness Score: ${total}/100 — ${band.en}\n\nScores by pillar:\n${lines}\n\n${optIn?'✅ I consent to adding my profile to the Mizaan investor network.\n':''}I'd like to discuss next steps (QAR 99).`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
}

function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
}
document.addEventListener('DOMContentLoaded',()=>{currentQ=-1;renderIdentity();});
</script>
</body>
</html>
