<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mizaan — Your Compliance, in Balance</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #0B1F3A;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .primary {
      background: #0B1F3A;
      color: white;
    }

    .whatsapp {
      background: green;
      color: white;
    }

    .danger { color: red; }
    .good { color: green; }

  </style>
</head>

<body>

<div class="container">

  <h1>Mizaan</h1>
  <p style="text-align:center;">Your Compliance, in Balance</p>
  <p style="text-align:center;">Check your Qatar audit & tax status in 60 seconds</p>

  <div class="card">
    <h3>Enter Company Details</h3>

    <label>Company Name</label><br>
    <input id="company" type="text" style="width:100%;padding:8px;"><br><br>

    <label>Registration Date</label><br>
    <input id="date" type="date" style="width:100%;padding:8px;"><br><br>

    <label>Net Profit (QAR)</label><br>
    <input id="profit" type="number" style="width:100%;padding:8px;"><br><br>

    <label>Ownership</label><br>
    <select id="ownership" style="width:100%;padding:8px;">
      <option value="qatari">100% Qatari</option>
      <option value="foreign">Foreign / Mixed</option>
    </select><br><br>

    <button class="primary" onclick="analyze()">Analyze Compliance</button>
  </div>

  <div id="result"></div>

</div>

<script>

const WA = '97451715999';

function analyze() {

  const name = document.getElementById('company').value;
  const date = document.getElementById('date').value;
  const profit = parseFloat(document.getElementById('profit').value || 0);
  const ownership = document.getElementById('ownership').value;

  if (!name || !date) {
    alert("Please enter required details");
    return;
  }

  // Audit Logic
  const cutoff = new Date('2025-06-30');
  const regDate = new Date(date);
  const auditRequired = regDate <= cutoff;

  // Tax Logic
  const taxApplicable = ownership === 'foreign';
  const tax = taxApplicable ? profit * 0.10 : 0;

  // Deadline
  const deadline = new Date('2026-04-30');
  const today = new Date();
  const daysRemaining = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

  // Score
  const score = auditRequired ? 40 : 85;

  // Risk
  const risk = auditRequired ? "High Risk" : "Low Risk";

  document.getElementById('result').innerHTML = `

  <div class="card">
    <h3>📊 Compliance Summary</h3>
    <p>Audit: ${auditRequired ? '<span class="danger">YES</span>' : '<span class="good">NO</span>'}</p>
    <p>Tax: ${taxApplicable ? '10%' : 'Not Applicable'}</p>
    <p>Deadline: 30 April 2026</p>
    <p>Days Remaining: <span class="danger">${daysRemaining}</span></p>
  </div>

  <div class="card">
    <h3>⚠️ Risk Alerts</h3>
    <p>${risk}</p>
    <p>${daysRemaining < 30 ? 'Deadline approaching' : ''}</p>
  </div>

  <div class="card">
    <h3>💰 Estimated Tax</h3>
    <p>QAR ${tax.toFixed(2)}</p>
  </div>

  <div class="card">
    <h3>📈 Compliance Score</h3>
    <p>${score} / 100</p>
  </div>

  <div class="card" style="text-align:center;">
    <h3>🚀 Take Action</h3>
    <p>Avoid penalties. Let experts handle your filing.</p>

    <button class="whatsapp" onclick="contact('${name}', ${tax})">
      Contact on WhatsApp
    </button>

    <br><br>

    <button class="primary">
      Unlock Full Filing Support — QAR 499 →
    </button>

  </div>

  `;
}

function contact(name, tax) {

  const msg = `Hi, I checked my company on Mizaan.

Company: ${name}
Estimated Tax: QAR ${tax}

I need help with audit & tax filing.`;

  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
